{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-header">
    <div class="row">
        <div class="col-sm-12">
            <h3 class="page-title">Edit Teacher</h3>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="first_name" value="{{ teacher.first_name }}" class="form-control">
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="last_name" value="{{ teacher.last_name }}" class="form-control">
            </div>

            <div class="form-group">
                <label>Teacher ID</label>
                <input type="text" name="teacher_id" value="{{ teacher.teacher_id }}" class="form-control">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ teacher.email }}" class="form-control">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="text" name="phone" value="{{ teacher.phone }}" class="form-control">
            </div>

            <div class="form-group">
                <label>Qualification</label>
                <input type="text" name="qualification" value="{{ teacher.qualification }}" class="form-control">
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea name="address" class="form-control">{{ teacher.address }}</textarea>
            </div>

            <button type="submit" class="btn btn-primary">Update</button>
        </form>
    </div>
</div>
{% endblock %}
