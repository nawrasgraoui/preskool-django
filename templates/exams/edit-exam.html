{% extends 'Home/base.html' %}
{% load static %}
{% block body %}

<div class="page-wrapper">
    <div class="content container-fluid">

        <div class="page-header">
            <div class="row align-items-center">
                <div class="col">
                    <h3 class="page-title">Edit Exam</h3>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
                        <li class="breadcrumb-item"><a href="{% url 'exam_list' %}">Exam List</a></li>
                        <li class="breadcrumb-item active">Edit Exam</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-sm-12">
                <div class="card">
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}

                            <div class="form-group">
                                <label>Exam Title</label>
                                <input type="text" name="title" class="form-control" value="{{ exam.title }}" required>
                            </div>

                            <div class="form-group">
                                <label>Subject</label>
                                <select name="subject" class="form-control" required>
                                    {% for subject in subjects %}
                                    <option value="{{ subject.id }}" {% if exam.subject.id == subject.id %}selected{% endif %}>
                                        {{ subject.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Exam Date</label>
                                <input type="date" name="exam_date" class="form-control" value="{{ exam.exam_date|date:'Y-m-d' }}" required>
                            </div>

                            <div class="form-group">
                                <label>Exam Time</label>
                                <input type="time" name="exam_time" class="form-control" value="{{ exam.exam_time|time:'H:i' }}" required>
                            </div>

                            <div class="form-group">
                                <label>Room</label>
                                <input type="text" name="room" class="form-control" value="{{ exam.room }}" required>
                            </div>

                            <div class="form-group">
                                <label>Description</label>
                                <textarea name="description" class="form-control">{{ exam.description }}</textarea>
                            </div>

                            <button type="submit" class="btn btn-primary">Update</button>
                            <a href="{% url 'exam_list' %}" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

{% endblock %}
